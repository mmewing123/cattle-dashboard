name: Update Market Data

on:
  schedule:
    - cron: '30 21 * * 1-5'   # Mon-Fri 3:30 PM Central (9:30 PM UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run market data script
        env:
          MARS_API_KEY: ${{ secrets.MARS_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          python write_market_data.py \
            --api-key "$MARS_API_KEY" \
            --av-key  "$ALPHAVANTAGE_API_KEY" \
            --output  docs/market_data.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/market_data.json
          git diff --staged --quiet || git commit -m "chore: update market data $(date -u +%Y-%m-%d)"
          git push
